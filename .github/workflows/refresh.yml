name: Refresh Circle data

on:
  schedule:
    # Fire ~7min after recruiting Flow finishes (Keboola Flow runs 06:41/08:41/12:41/14:41 UTC, done by ~:48)
    - cron: "55 6,8,12,14 * * *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Pull live source data from tribe-recruiting
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/bark8922/tribe-recruiting/main/recruiting-dashboard/src/dashboard_data_snowflake.json" \
            -o /tmp/sf.json
      - name: Regenerate circle_data.json
        env:
          BAMBOOHR_SUBDOMAIN: ${{ secrets.BAMBOOHR_SUBDOMAIN }}
          BAMBOOHR_API_KEY: ${{ secrets.BAMBOOHR_API_KEY }}
        run: |
          python3 build_circle_data.py
          python3 inject_jobs.py
      - name: Commit + push if changed
        run: |
          git config user.email "circle-bot@tribe.xyz"
          git config user.name "circle-refresh-bot"
          git add circle_data.json
          if git diff --staged --quiet; then
            echo "No data changes; skipping commit."
          else
            git commit -m "auto: refresh circle_data.json ($(date -u +'%Y-%m-%d %H:%MZ'))"
            git push
          fi
