name: Refresh Circle data

on:
  # Primary trigger: Keboola fires this the moment fresh data lands in
  # tribe-recruiting (see keboola_entry.py notify_circle). Event-driven, so
  # no dependence on GitHub's best-effort cron delivery.
  repository_dispatch:
    types: [recruiting-data-updated]
  # Backstop only: GitHub cron is best-effort and silently dropped both
  # morning slots on 2026-06-10. Kept as a safety net behind the dispatch.
  schedule:
    - cron: "55 6,8,12,14 * * *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Pull live source data from tribe-recruiting
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/bark8922/tribe-recruiting/main/recruiting-dashboard/public/dashboard_data_snowflake.json.gz" \
            -o /tmp/sf.json.gz
          gunzip -f /tmp/sf.json.gz
      - name: Regenerate circle_data.json
        env:
          BAMBOOHR_SUBDOMAIN: ${{ secrets.BAMBOOHR_SUBDOMAIN }}
          BAMBOOHR_API_KEY: ${{ secrets.BAMBOOHR_API_KEY }}
        run: |
          python3 build_circle_data.py
          python3 inject_jobs.py
      - name: Commit + push if changed
        run: |
          git config user.email "circle-bot@tribe.xyz"
          git config user.name "circle-refresh-bot"
          git add circle_data.json
          if git diff --staged --quiet; then
            echo "No data changes; skipping commit."
          else
            git commit -m "auto: refresh circle_data.json ($(date -u +'%Y-%m-%d %H:%MZ'))"
            git push
          fi
